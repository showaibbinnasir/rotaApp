<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Rota Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --border:#E4E2DC;
  --text:#1A1917;
  --muted:#888784;
  --accent:#1A1917;
  --accent-fg:#FFFFFF;
  --danger:#C0392B;
  --indigo:#4338CA;
  --indigo-light:#EEF2FF;
  --green:#16A34A;
  --green-light:#DCFCE7;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --radius:16px;
  --radius-sm:10px;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  min-height:100vh;
  padding:20px 16px 60px;
}
.container{max-width:1300px;margin:auto;}

/* TOPBAR */
.topbar{
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--border);
  padding:20px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}
.topbar-title h1{font-size:26px;font-weight:600;letter-spacing:-0.5px;}
.topbar-title p{color:var(--muted);font-size:13px;margin-top:2px;}
.topbar-controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;}
.add-row{display:flex;gap:8px;flex:1;min-width:220px;}
input[type=text],input[type=date]{
  flex:1;
  padding:12px 14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  background:var(--bg);
  color:var(--text);
  outline:none;
  -webkit-appearance:none;
}
input[type=text]:focus,input[type=date]:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(67,56,202,.1);}
input[type=time]{
  width:100%;
  padding:12px 10px;
  border-radius:var(--radius-sm);
  border:1px solid rgba(255,255,255,.25);
  font-family:'DM Mono',monospace;
  font-size:15px;
  background:rgba(255,255,255,.12);
  color:#fff;
  outline:none;
  -webkit-appearance:none;
  appearance:none;
}
input[type=time]:focus{border-color:rgba(255,255,255,.6);}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7;}
.btn{
  padding:12px 16px;
  border-radius:var(--radius-sm);
  border:none;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  transition:all .15s;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn:active{transform:scale(.97);}
.btn-dark{background:var(--accent);color:var(--accent-fg);}
.btn-dark:hover{background:#333;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#A93226;}
.btn-ghost{background:transparent;color:var(--muted);padding:8px;font-size:13px;border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg);}
.date-row{display:flex;gap:8px;flex-wrap:wrap;}
.date-row input[type=date]{min-width:140px;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr;gap:20px;}
@media(max-width:760px){
  .layout{grid-template-columns:1fr;}
}

/* CARDS */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--border);
  padding:18px;
  box-shadow:var(--shadow);
}
.card-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-title h2{font-size:16px;font-weight:600;}
.badge{
  background:var(--bg);
  border:1px solid var(--border);
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  color:var(--muted);
  font-family:'DM Mono',monospace;
}
.badge-green{background:var(--green-light);color:var(--green);border-color:transparent;}

/* STAFF SIDEBAR */
.staff-list{display:flex;flex-direction:column;gap:8px;}
.staff-item{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:grab;
  transition:all .2s;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.staff-item.dragging{
  opacity:.4;
  cursor:grabbing;
}
.staff-item.drag-over-self{opacity:.4;}
.staff-name{font-weight:500;font-size:14px;}
.del-btn{
  background:transparent;
  border:none;
  color:var(--muted);
  cursor:pointer;
  padding:4px 6px;
  border-radius:6px;
  font-size:16px;
  line-height:1;
  transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.del-btn:hover{color:var(--danger);}
.empty{
  border:1.5px dashed var(--border);
  padding:18px;
  border-radius:var(--radius-sm);
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

/* ROTA GRID */
.rota-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}

/* DAY CARD */
.day-card{cursor:default;}
.day-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  padding:4px 2px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.day-header-left{display:flex;align-items:center;gap:8px;}
.day-header h3{font-size:15px;font-weight:600;}
.chevron{
  color:var(--muted);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
  font-size:18px;
  line-height:1;
}
.day-card.expanded .chevron{transform:rotate(180deg);}
.day-card.drop-target{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(67,56,202,.15);}

/* ANIMATED BODY */
.day-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow:hidden;
  max-height:0;
  opacity:0;
  padding-top:0;
  transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease,padding-top .3s ease;
}
.day-card.expanded .day-list{
  max-height:3000px;
  opacity:1;
  padding-top:14px;
}

/* ASSIGNED ITEM */
.assigned-item{
  background:linear-gradient(135deg,#1A1917,#2D2C29);
  color:#fff;
  border-radius:var(--radius-sm);
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.assigned-top{display:flex;justify-content:space-between;align-items:center;}
.assigned-name{font-weight:600;font-size:14px;}
.remove-btn{
  background:rgba(255,255,255,.12);
  color:#fff;
  border:none;
  border-radius:6px;
  padding:5px 10px;
  font-size:12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:background .15s;
}
.remove-btn:hover{background:rgba(255,255,255,.22);}
.shift-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.shift-label{font-size:11px;opacity:.6;margin-bottom:5px;letter-spacing:.3px;}

/* HOURS SUMMARY */
.hours-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.hour-card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:14px;
}
.hour-name{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px;}
.hour-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--text);}

/* GHOST DRAG CLONE */
#drag-ghost{
  position:fixed;
  pointer-events:none;
  z-index:9999;
  background:var(--text);
  color:#fff;
  padding:10px 16px;
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
  transform:translate(-50%,-50%);
  display:none;
  white-space:nowrap;
}

@media(max-width:760px){
  .staff-sidebar{display:none;}
}
@media(max-width:480px){
  body{padding:14px 12px 200px;}
  .topbar{padding:16px;}
  .topbar-title h1{font-size:22px;}
  .rota-grid{grid-template-columns:1fr;}
  .hours-grid{grid-template-columns:repeat(2,1fr);}
}

/* ── MOBILE FLOATING STAFF DRAWER ── */
#staff-float{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:1000;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  box-shadow:0 -6px 28px rgba(0,0,0,.13);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  /* collapsed: only handle + pill strip visible (~72px) */
  transform:translateY(calc(100% - 72px));
  /* cap the max open height so it never swallows the screen */
  max-height:35vh;
}
#staff-float.open{transform:translateY(0);}
@media(max-width:760px){#staff-float{display:block;}}

/* drag handle pill at top */
.float-handle{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px 8px;
  cursor:pointer;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.float-handle-bar{
  width:36px;height:4px;
  background:var(--border);
  border-radius:2px;
  position:absolute;
  left:50%;transform:translateX(-50%);
  top:8px;
}
.float-handle-title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;padding-top:4px;}
.float-chevron{color:var(--muted);font-size:16px;transition:transform .3s;padding-top:4px;}
#staff-float.open .float-chevron{transform:rotate(180deg);}

/* collapsed: horizontal scrollable pill row */
.float-strip{
  display:flex;
  gap:8px;
  padding:0 14px 14px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  /* thin visible scrollbar so user knows it scrolls */
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.float-strip::-webkit-scrollbar{height:3px;}
.float-strip::-webkit-scrollbar-track{background:transparent;}
.float-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#staff-float.open .float-strip{display:none;}

.float-pill{
  flex-shrink:0;
  background:var(--accent);
  color:#fff;
  padding:9px 15px;
  border-radius:999px;
  font-size:13px;
  font-weight:500;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.float-pill.dragging{opacity:.35;}

/* open: fixed-height scrollable list */
.float-body{
  display:none;
  /* fixed height — never grows beyond this, scrolls instead */
  height:calc(35vh - 72px);
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
  padding:4px 14px 20px;
  /* styled scrollbar */
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.float-body::-webkit-scrollbar{width:4px;}
.float-body::-webkit-scrollbar-track{background:transparent;}
.float-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#staff-float.open .float-body{display:block;}

/* subtle top fade to hint scroll */
.float-body-wrap{
  position:relative;
}
.float-body-wrap::after{
  content:'';
  position:sticky;
  bottom:0;
  display:block;
  height:28px;
  background:linear-gradient(to top,var(--surface),transparent);
  pointer-events:none;
  margin-top:-28px;
}
</style>
</head>
<body>
<div class="container">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-title">
      <h1>Rota Planner</h1>
      <p>Drag staff onto days to build your weekly schedule</p>
    </div>
    <div class="topbar-controls">
      <div class="add-row">
        <input type="text" id="staffInput" placeholder="Staff member name…"/>
        <button class="btn btn-dark" onclick="addStaff()">Add</button>
      </div>
      <div class="date-row">
        <input type="date" id="weekStart"/>
        <button class="btn btn-dark" onclick="downloadPDF()">PDF</button>
        <button class="btn btn-danger" onclick="clearAllData()">Clear</button>
      </div>
    </div>
  </div>

  <!-- HOURS SUMMARY (full width) -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-title">
      <h2>Weekly hours</h2>
      <span class="badge badge-green" id="totalHrsBadge">0 hrs total</span>
    </div>
    <div id="hoursSummary"></div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="layout">
    <!-- STAFF SIDEBAR -->
    <div class="card staff-sidebar" style="align-self:start;">
      <div class="card-title">
        <h2>Staff</h2>
        <span class="badge" id="staffCount">0</span>
      </div>
      <div class="staff-list" id="staffList"></div>
    </div>

    <!-- ROTA GRID -->
    <div class="rota-grid" id="rotaGrid"></div>
  </div>
</div>

<!-- MOBILE FLOATING STAFF DRAWER -->
<div id="staff-float">
  <div class="float-handle" onclick="toggleFloat()">
    <div class="float-handle-bar"></div>
    <span class="float-handle-title">👥 Staff <span class="badge" id="floatStaffCount">0</span></span>
    <span class="float-chevron">▾</span>
  </div>
  <div class="float-strip" id="floatStrip"></div>
  <div class="float-body-wrap">
    <div class="float-body">
      <div class="staff-list" id="floatStaffList"></div>
    </div>
  </div>
</div>

<!-- DRAG GHOST -->
<div id="drag-ghost"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

let staff=JSON.parse(localStorage.getItem('rota_staff')||'[]');
let rota=JSON.parse(localStorage.getItem('rota_data')||'null')||
  {Monday:[],Tuesday:[],Wednesday:[],Thursday:[],Friday:[],Saturday:[],Sunday:[]};
let expandedDay=localStorage.getItem('rota_expanded')||null;

/* ─── persistence ─── */
function save(){
  localStorage.setItem('rota_staff',JSON.stringify(staff));
  localStorage.setItem('rota_data',JSON.stringify(rota));
  localStorage.setItem('rota_expanded',expandedDay||'');
}

/* ─── staff management ─── */
function addStaff(){
  const el=document.getElementById('staffInput');
  const name=el.value.trim();
  if(!name)return;
  staff.push({id:Date.now(),name});
  el.value='';
  save();render();
}
function toggleFloat(){
  document.getElementById('staff-float').classList.toggle('open');
}

function deleteStaff(id){
  staff=staff.filter(p=>p.id!==id);
  DAYS.forEach(d=>{rota[d]=rota[d].filter(p=>p.id!==id);});
  save();render();
}
function removeFromDay(day,id){
  rota[day]=rota[day].filter(p=>p.id!==id);
  save();render();
}
function updateShift(day,id,type,val){
  const p=rota[day].find(p=>p.id===id);
  if(p)p[type]=val;
  save();renderHours();
}
function toggleDay(day){
  expandedDay=expandedDay===day?null:day;
  save();renderRota();
}

/* ─── hours calculation ─── */
function calcHours(){
  const t={};
  DAYS.forEach(d=>rota[d].forEach(p=>{
    if(!p.start||!p.end)return;
    const s=new Date('1970-01-01T'+p.start);
    const e=new Date('1970-01-01T'+p.end);
    let h=(e-s)/3600000;
    if(h<0)h+=24;
    t[p.name]=(t[p.name]||0)+h;
  }));
  return Object.entries(t).map(([name,hours])=>({name,hours}));
}

/* ─── drag state ─── */
let dragging=null; // {person, sourceEl}
let ghost=document.getElementById('drag-ghost');

/* ─── MOUSE drag ─── */
function startMouseDrag(e,person,el){
  if(e.button!==0)return;
  dragging={person};
  ghost.textContent=person.name;
  ghost.style.display='block';
  moveGhost(e.clientX,e.clientY);
  el.classList.add('dragging');
  document.addEventListener('mousemove',onMouseMove);
  document.addEventListener('mouseup',onMouseUp);
}
function onMouseMove(e){moveGhost(e.clientX,e.clientY);highlightDay(e.clientX,e.clientY);}
function onMouseUp(e){
  dropOnDay(e.clientX,e.clientY);
  endDrag();
}

/* ─── TOUCH drag ─── */
let touchItem=null;
function startTouchDrag(e,person,el){
  if(e.touches.length!==1)return;
  dragging={person};
  touchItem=el;
  const t=e.touches[0];
  ghost.textContent=person.name;
  ghost.style.display='block';
  moveGhost(t.clientX,t.clientY);
  el.classList.add('dragging');
}
function onTouchMove(e){
  if(!dragging)return;
  e.preventDefault();
  const t=e.touches[0];
  moveGhost(t.clientX,t.clientY);
  highlightDay(t.clientX,t.clientY);
}
function onTouchEnd(e){
  if(!dragging)return;
  const t=e.changedTouches[0];
  dropOnDay(t.clientX,t.clientY);
  endDrag();
}

document.addEventListener('touchmove',onTouchMove,{passive:false});
document.addEventListener('touchend',onTouchEnd);
document.addEventListener('touchcancel',endDrag);

function moveGhost(x,y){
  ghost.style.left=x+'px';
  ghost.style.top=y+'px';
}

function getDayCardAtPoint(x,y){
  // hide ghost so elementFromPoint works
  ghost.style.display='none';
  const el=document.elementFromPoint(x,y);
  ghost.style.display='block';
  if(!el)return null;
  return el.closest('[data-day]');
}

function highlightDay(x,y){
  document.querySelectorAll('[data-day]').forEach(c=>c.classList.remove('drop-target'));
  const card=getDayCardAtPoint(x,y);
  if(card)card.classList.add('drop-target');
}

function dropOnDay(x,y){
  document.querySelectorAll('[data-day]').forEach(c=>c.classList.remove('drop-target'));
  if(!dragging)return;
  const card=getDayCardAtPoint(x,y);
  if(!card)return;
  const day=card.dataset.day;
  const person=dragging.person;
  if(rota[day].find(p=>p.id===person.id))return; // already there
  rota[day].push({id:person.id,name:person.name,start:'',end:''});
  expandedDay=day;
  save();render();
}

function endDrag(){
  ghost.style.display='none';
  document.querySelectorAll('.dragging').forEach(e=>e.classList.remove('dragging'));
  dragging=null;
  touchItem=null;
  document.removeEventListener('mousemove',onMouseMove);
  document.removeEventListener('mouseup',onMouseUp);
}

/* ─── RENDER staff ─── */
function makeStaffItem(person){
  const el=document.createElement('div');
  el.className='staff-item';
  el.innerHTML=`<span class="staff-name">${esc(person.name)}</span><button class="del-btn" aria-label="Remove ${esc(person.name)}">✕</button>`;
  el.querySelector('button').onclick=(e)=>{e.stopPropagation();deleteStaff(person.id);};
  el.addEventListener('mousedown',e=>startMouseDrag(e,person,el));
  el.addEventListener('touchstart',e=>startTouchDrag(e,person,el),{passive:true});
  return el;
}
function makePill(person){
  const el=document.createElement('div');
  el.className='float-pill';
  el.textContent=person.name;
  el.addEventListener('mousedown',e=>startMouseDrag(e,person,el));
  el.addEventListener('touchstart',e=>startTouchDrag(e,person,el),{passive:true});
  return el;
}
function renderStaff(){
  const list=document.getElementById('staffList');
  const strip=document.getElementById('floatStrip');
  const floatList=document.getElementById('floatStaffList');
  const count=staff.length;
  document.getElementById('staffCount').textContent=count;
  document.getElementById('floatStaffCount').textContent=count;
  const empty='<div class="empty">No staff yet — add someone above</div>';
  if(!count){
    list.innerHTML=empty;
    strip.innerHTML='';
    floatList.innerHTML=empty;
    return;
  }
  list.innerHTML='';strip.innerHTML='';floatList.innerHTML='';
  staff.forEach(person=>{
    list.appendChild(makeStaffItem(person));
    strip.appendChild(makePill(person));
    floatList.appendChild(makeStaffItem(person));
  });
}

/* ─── RENDER rota ─── */
function renderRota(){
  const grid=document.getElementById('rotaGrid');
  grid.innerHTML='';
  DAYS.forEach(day=>{
    const isExp=expandedDay===day;
    const card=document.createElement('div');
    card.className='card day-card'+(isExp?' expanded':'');
    card.dataset.day=day;

    const assigned=rota[day].map(p=>`
      <div class="assigned-item">
        <div class="assigned-top">
          <span class="assigned-name">${esc(p.name)}</span>
          <button class="remove-btn" onclick="removeFromDay('${day}',${p.id})">Remove</button>
        </div>
        <div class="shift-row">
          <div>
            <div class="shift-label">START</div>
            <input type="time" value="${p.start||''}" onchange="updateShift('${day}',${p.id},'start',this.value)"/>
          </div>
          <div>
            <div class="shift-label">END</div>
            <input type="time" value="${p.end||''}" onchange="updateShift('${day}',${p.id},'end',this.value)"/>
          </div>
        </div>
      </div>
    `).join('');

    card.innerHTML=`
      <div class="day-header" onclick="toggleDay('${day}')">
        <div class="day-header-left">
          <span class="chevron">▾</span>
          <h3>${day}</h3>
        </div>
        <span class="badge">${rota[day].length}</span>
      </div>
      <div class="day-list">
        ${assigned||'<div class="empty">Drag a staff member here</div>'}
      </div>
    `;
    grid.appendChild(card);
  });
}

/* ─── RENDER hours ─── */
function renderHours(){
  const container=document.getElementById('hoursSummary');
  const badge=document.getElementById('totalHrsBadge');
  const totals=calcHours();
  if(!totals.length){
    container.innerHTML='<div class="empty">Add shifts to see weekly hour totals</div>';
    badge.textContent='0 hrs total';
    return;
  }
  const total=totals.reduce((a,b)=>a+b.hours,0);
  badge.textContent=total.toFixed(1)+' hrs total';
  container.innerHTML=`<div class="hours-grid">${totals.map(p=>`
    <div class="hour-card">
      <div class="hour-name">${esc(p.name)}</div>
      <div class="hour-val">${p.hours.toFixed(1)}<span style="font-size:13px;color:var(--muted);margin-left:3px;">hrs</span></div>
    </div>
  `).join('')}</div>`;
}

/* ─── PDF export ─── */
async function downloadPDF(){
  const startInput=document.getElementById('weekStart').value;
  if(!startInput){alert('Please select a week start date first.');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('landscape');
  const [sy_,sm_,sd_]=startInput.split('-').map(Number);
  const startDate=new Date(sy_,sm_-1,sd_); // local midnight — avoids UTC offset shifting the day
  const dates=DAYS.map((_,i)=>{const d=new Date(sy_,sm_-1,sd_+i);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});});
  const staffNames=[...new Set(staff.map(s=>s.name))];
  const table=staffNames.map(name=>{
    const row={name};
    DAYS.forEach(d=>{const e=rota[d].find(p=>p.name===name);row[d]=(e&&e.start&&e.end)?`${e.start} – ${e.end}`:'-';});
    return row;
  });
  const pw=doc.internal.pageSize.getWidth();
  const ph=doc.internal.pageSize.getHeight();
  const sx=10,sy=38,cw=(pw-20)/(DAYS.length+1),rh=13;
  doc.setFontSize(18);doc.text('Weekly Staff Rota',14,14);
  doc.setFontSize(10);doc.setTextColor(100);doc.text(`Week: ${dates[0]} – ${dates[6]}`,14,24);
  doc.setTextColor(0);
  doc.setFillColor(25,25,23);doc.setTextColor(255,255,255);doc.setFontSize(8);
  doc.rect(sx,sy,cw,rh,'F');doc.text('Staff',sx+3,sy+8.5);
  DAYS.forEach((day,i)=>{
    const x=sx+cw*(i+1);const label=day;
    doc.setFillColor(25,25,23);doc.rect(x,sy,cw,rh,'F');
    doc.setTextColor(255,255,255);
    const tw=doc.getTextWidth(label);
    doc.text(label,x+(cw/2)-(tw/2),sy+8.5);
  });
  doc.setTextColor(0,0,0);
  let y=sy+rh;
  table.forEach((row,ri)=>{
    if(y>ph-20){doc.addPage();y=20;}
    const fill=ri%2===0?240:255;
    doc.setFillColor(fill,fill,fill);
    doc.rect(sx,y,(pw-20),rh,'F');
    doc.setFontSize(8);
    doc.rect(sx,y,cw,rh);doc.text(row.name,sx+3,y+8.5);
    DAYS.forEach((d,i)=>{const x=sx+cw*(i+1);doc.rect(x,y,cw,rh);doc.text(row[d],x+3,y+8.5);});
    y+=rh;
  });
  doc.addPage();
  doc.setFontSize(16);doc.text('Hours Summary',14,18);
  const totals=calcHours();let sy2=34;
  totals.forEach(p=>{doc.setFontSize(11);doc.text(`${p.name}  –  ${p.hours.toFixed(2)} hrs`,20,sy2);sy2+=10;});
  doc.save(`rota-${startInput}.pdf`);
}

/* ─── clear all ─── */
function clearAllData(){
  if(!confirm('Delete all rota data?'))return;
  staff=[];
  rota={Monday:[],Tuesday:[],Wednesday:[],Thursday:[],Friday:[],Saturday:[],Sunday:[]};
  expandedDay=null;
  ['rota_staff','rota_data','rota_expanded'].forEach(k=>localStorage.removeItem(k));
  render();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){renderStaff();renderRota();renderHours();}

document.getElementById('staffInput').addEventListener('keydown',e=>{if(e.key==='Enter')addStaff();});

render();
</script>
